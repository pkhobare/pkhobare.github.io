<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1f4068"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="screen"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)" />
  <circle cx="360" cy="220" r="200" fill="url(#glow)" filter="url(#blur)" opacity="0.7"/>

  <!-- Abstract 3D-like ribbons (three-fiber vibe) -->
  <g transform="translate(200,120) scale(1.1)">
    <path d="M50,200 C150,50 350,350 450,180 C550,10 750,270 850,150" fill="none" stroke="#60a5fa" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" filter="url(#soft)"/>
    <path d="M60,220 C160,70 360,370 460,200 C560,30 760,290 860,170" fill="none" stroke="#7dd3fc" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>

  <!-- Mesh sphere -->
  <g transform="translate(740,420) scale(0.9)">
    <circle cx="0" cy="0" r="140" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1" transform="translate(740,420)"/>
    <g transform="translate(740,420)">
      <!-- latitude lines -->
      <g stroke="rgba(255,255,255,0.08)" stroke-width="1">
        <ellipse rx="120" ry="18" fill="none" transform="rotate(0)"/>
        <ellipse rx="120" ry="30" fill="none" transform="rotate(25)"/>
        <ellipse rx="120" ry="45" fill="none" transform="rotate(-20)"/>
      </g>
      <!-- longitude lines -->
      <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
        <path d="M-120,0 A120,120 0 0,1 120,0" fill="none"/>
        <path d="M-90,0 A90,90 0 0,1 90,0" fill="none"/>
      </g>
      <circle r="6" fill="#34d399" transform="translate(40,-30)"/>
    </g>
  </g>

  <!-- Copilot overlay badge -->
  <g transform="translate(920,40)">
    <rect x="0" y="0" width="220" height="56" rx="10" fill="#0f172a" opacity="0.85" stroke="#94a3b8" stroke-width="0.6"/>
    <rect x="10" y="8" width="40" height="40" rx="8" fill="#06b6d4"/>
    <path d="M22 18 L30 26 L18 34" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,0)"/>
    <text x="60" y="38" font-family="Inter,Arial,Helvetica,sans-serif" font-size="18" fill="#e6eef6">Copilot</text>
  </g>

  <!-- Title hint in SVG (optional) -->
  <text x="60" y="720" font-family="Inter,Arial,Helvetica,sans-serif" font-size="22" fill="#e6eef6" opacity="0.9">React Three Fiber — Copilot Demo</text>

</svg>
